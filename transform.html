<!DOCTYPE html>

<head>

    <title>Transform in html and css</title>
    
<style>
    .box{
        width: 200px;
        height: 200px;
        background-color: rgb(208, 226, 94);
        transform: rotate(45deg);
        transform: scale(1.5);
        transform: translate(100px,100px);
        margin: 50px
    }
</style>

</head>
<body>
    <div class= "box"></div>
</body>
</html>
