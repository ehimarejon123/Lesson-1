<!DOCTYPE html>

<head>

    <title>Text Shadow, Text indent, box shadow in css</title>
    <style>
        h1{
            text-shadow: 2px 2px 5px rgb(38, 1, 160);
        }
        p{
            text-indent: 50px;
        }
        .box{
            width: 200px;
            height: 200px;
            background-color: rgb(255, 0, 102);
            box-shadow: 10px 10px 5px 5px greenyellow;
        }

    </style>
</head>
<body>
    <h1>Shadow text</h1>
    <p>This is an example of a text indent</p>

    <div class= "box"></div>
</body>
</html>
