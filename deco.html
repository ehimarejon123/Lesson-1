<!DOCTYPE html>

<head>

    <title>Text decoration and text tranformation in CSS and HTML</title>
    <style>
        .underline{
            text-decoration: underline;
        }
        .line{
            text-decoration: line-through;
        }       
        .upper{
            text-transform: uppercase;
        }
        .cap{
            text-transform: capitalize;
        }
    </style>
</head>
<body>
    <p class="underline">this will make the text underlined </p>
    <p class="line">this will put a line through the text </p>

    <p class="upper">this will make the text in capital letters </p>
    <p class="cap">this will make the first letter of the words capitalized </p>
</body>
</html>
