<!DOCTYPE html>

<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Badges in Bootstrap</title>
</head>
<body>
    <br>
    <h4>messages <span class="badge bg-danger">4</span></h4>
    <h4>notifications <span class="badge bg-primary">8</span></h4>
    <h4>tasks <span class="badge bg-success">3</span></h4>

    <button class="btn btn-primary">task pending <span class="badge bg-warning text-dark"></span></button>

</body>
</html>
