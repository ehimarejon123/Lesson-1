<!DOCTYPE html>

<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Container in bootstrap</title>
</head>
<body>
    <div class="container bg-primary text-white p-3">
        This is a normal container.It has a fixed width and is centered on the page.The width of the container changes based on the screen size.
    </div>
    <div class="container-fluid bg-success text-white p-3 mt-3">
        This is a fluid container.It has no fixed width takes up the full width of the page.
    </div>
</body>
</html>
