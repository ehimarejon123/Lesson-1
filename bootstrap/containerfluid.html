<!DOCTYPE html>

<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>container fluids with bootstrap</title>
</head>
<body>
    <div class="container text-primary p-4">
        <u>Container Fluids (This text will be blue)</u>


    </div>
    <div class="container-fluid bg-success text-white p-3 mt-3">
                This is a fluid container.It has no fixed width takes up the full width of the page.
    </div>
    <div class="container-fluid bg-danger text-black p-3 mt-3">
                This container fluid will be red.
    </div>   
    <div class="container-fluid bg-secondary text-white p-3 mt-3">
                This container fluid will be grey.
    </div>   
</body>
</html>
