<!DOCTYPE html>

<head>

    <title>Calculator</title>

    <style>
        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

            font-family: Arial, sans-serif;

        }

        body {

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            overflow: hidden;

        }

        /* Background */

        .background {

            width: 100vw;

            height: 100vh;

            position: relative;

            display: flex;

            justify-content: center;

            align-items: center;

            background:

                linear-gradient(90deg,

                    #07383b 0%,

                    #07383b 48%,

                    #eef1f7 48%,

                    #eef1f7 100%);

        }

        .background::before {

            content: "";

            position: absolute;

            width: 500px;

            height: 500px;

            background: white;

            border-radius: 50%;

            left: -260px;

            bottom: -250px;

        }

        .background::after {

            content: "";

            position: absolute;

            width: 400px;

            height: 250px;

            background: #d9e5ff;

            right: -40px;

            bottom: 80px;

            transform: skew(-25deg);

        }

        /* Calculator */

        .calculator {

            width: 420px;

            background: white;

            border-radius: 12px;

            box-shadow:

                0 8px 25px rgba(0, 0, 0, 0.15);

            padding: 30px;

            display: grid;

            grid-template-columns: repeat(4, 1fr);

            gap: 15px;

            position: relative;

            z-index: 10;

        }

        #display {

            grid-column: span 4;

            height: 90px;

            border: none;

            outline: none;

            background: #f5f5f5;

            border-radius: 10px;

            text-align: right;

            padding: 15px;

            font-size: 36px;

            font-weight: bold;

        }

        /* Buttons */

        button {

            height: 70px;

            border: none;

            border-radius: 12px;

            background: #f5f5f5;

            font-size: 22px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.2s;

        }

        button:hover {

            transform: scale(1.05);

        }

        button:active {

            transform: scale(0.95);

        }

        /* Operator Buttons */

        .operator {

            color: black;

        }

        .plus {

            background: #4cc7dc;

        }

        .multiply {

            background: #e9a81c;

        }

        .minus {

            background: #f3c6ce;

        }

        .divide {

            background: #d6e2ff;

        }

        .equal {

            background: #ddd8f8;

        }

        .zero {

            grid-column: span 2;

        }
    </style>
</head>

<body>
    <div class="background">

        <div class="calculator">

            <input type="text" id="display" value="0" readonly>

            <button>C</button>

            <button>CE</button>

            <button>%</button>

            <button class="operator plus">+</button>

            <button>7</button>

            <button>8</button>

            <button>9</button>

            <button class="operator multiply">*</button>

            <button>4</button>

            <button>5</button>

            <button>6</button>

            <button class="operator minus">-</button>

            <button>1</button>

            <button>2</button>

            <button>3</button>

            <button class="operator divide">/</button>

            <button class="zero">0</button>

            <button>.</button>

            <button class="operator equal">=</button>

        </div>

    </div>
    <script>
        const display = document.getElementById("display");

        let expression = "";

        const buttons = document.querySelectorAll("button");

        buttons.forEach(button => {

            button.addEventListener("click", () => {

                const value = button.textContent;

                switch (value) {

                    case "C":

                        expression = "";

                        display.value = "0";

                        break;

                    case "CE":

                        expression = expression.slice(0, -1);

                        display.value = expression || "0";

                        break;

                    case "=":

                        try {

                            expression = eval(expression).toString();

                            display.value = expression;

                        } catch {

                            display.value = "Error";

                            expression = "";

                        }

                        break;

                    case "%":

                        try {

                            expression = (

                                eval(expression) / 100

                            ).toString();

                            display.value = expression;

                        } catch {

                            display.value = "Error";

                            expression = "";

                        }

                        break;

                    default:

                        if (

                            display.value === "0" &&

                            !isNaN(value)

                        ) {

                            expression = value;

                        } else {

                            expression += value;

                        }

                        display.value = expression;

                }

            });

        });
    </script>
</body>

</html>
