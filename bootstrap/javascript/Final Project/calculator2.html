<!DOCTYPE html>

<head>

    <title>Calculator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .background {
            width: 100vh;
            height: 100vh;
            position: relative;
            justify-content: center;
            align-items: center;

            background:
            linear-gradient(90deg,
            #07383b 0%,
            #07383b 48%,
            #eef1f7 48%,
            #eef1f7 100%);

        }
        .background::before {

content: "";

position: absolute;

width: 500px;

height: 500px;

background: white;

border-radius: 50%;

left: -260px;

bottom: -250px;

}

        .background::after{
            content: "";
            position: absolute;

            width: 400px;
            height: 250px;

            background: #d9e5ff;

            right: -40px;
            bottom: 80px;

            transform: skew(-25deg);
        }

        .calculator {
            width: 420px;
            height: 600px;

            background: white;

            border-radius: 8px;

            box-shadow: 
            0 8px 25px rgba(0, 0, 0, 0, 15);

            display: grid;

            grid-template-columns: 
            repeat(4, 1fr);

            gap: 30px;

            padding: 40px;

            position: relative;
            z-index: 10;
        }

        button {
            border: name;
            background: none;

            font-size: 18px;
            font-weight: bold;

            color: #111;

            cursor: pointer;
        }

        .operator {
            width: 70px;
            height: 70px;

            border-radius: 50px;

            justify-self: center;

            font-size: 24px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .plus {
            background: #4cc7dc;
        }
        .multiply {
            background: #e9a81c;
        }
        .minus {
            background: #f3c6ce;
        }
        .divide {
            background: #d6e2ff;
        }
        .equal {
            background: #ddd8f8;
        }
    </style>
</head>
<body>
    <div class="background">

<div class="calculator">

<button>C</button>

<button>CE</button>

<button>%</button>

<button class="operator plus">+</button>

<button>7</button>

<button>8</button>

<button>9</button>

<button class="operator multiply">×</button>

<button>4</button>

<button>5</button>

<button>6</button>

<button class="operator minus">−</button>

<button>1</button>

<button>2</button>

<button>3</button>

<button class="operator divide">+</button>

<button></button>

<button>0</button>

<button></button>

<button class="operator equal">=</button>

</div>

</div>
</body>
</html>
