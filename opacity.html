<!DOCTYPE html>

<head>

    <title>Opacity in CSS</title>
    <style>
        div{
            width: 200px;
            height: 80px;
            background: blue;
            color: white;
            margin: 10px;
            padding: 20px;
        }
        .box{
            opacity: 1;
        }
        .box2{
            opacity: 0.5;
        }
        .box3{
            opacity: 0.2;
        }
        .box4{
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="box1">Box 1</div>
    <div class="box2">Box 2</div>
    <div class="box3">Box 3</div>
    <div class="box4">Box 4</div>
</body>
</html>
