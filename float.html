<!DOCTYPE html>

<head>

    <title>Float in CSS</title>
    <style>
        .box1{
            width: 200px;
            height: 200px;
            background-color: red;
            float: left;
        }

        .box2{
            width: 200px;
            height: 200px;
            background-color: green;
            float: right;
        }
    </style>
</head>
<body>
    <div class= "box1">box 1</div>
    <div class= "box2">box 2</div>
</body>
</html>
