<!DOCTYPE html>

<head>

    <title>Animation</title>

<style>
    .box{
    width: 200px;
    height: 200px;
    background-color:red ;
    animation:move 6s infinite alternate;
}
@keyframes move {

   0% {
        transform: translateX(0);
        background-color: red;
    }
       50% {
        transform: translateX(200px);
        background-color: orange;
    }
       100% {
        transform: translateX(0);
        background-color: purple;
    }
}

</style>
</head>

<body>

    <div class= "box"></div>
</body>
</html>
